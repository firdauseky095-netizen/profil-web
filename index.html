<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Profil Mahasiswa Informatika</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

/* SCROLL SNAP */
html {
    scroll-behavior: smooth;
}

body {
    scroll-snap-type: y mandatory;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: #00eaff;
}

/* SEMUA SECTION */
.section, .header {
    min-height: 100vh;
    scroll-snap-align: start;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* HEADER */
.header {
    text-align: center;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");

    background-size: cover;
    background-position: center;

    color: white;

    animation: fadeIn 1.5s ease;
}

.header img {
    width: 120px;
    border-radius: 50%;
    border: 3px solid white;
}

.header h1 {
    font-size: 45px;
    text-shadow: 2px 2px 6px black;
}

.header p {
    text-shadow: 1px 1px 4px black;
}

/* PROFIL */
#profil {
    background: #f5f5f5;
}

.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    padding: 20px;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);

    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* KONTAK */
#kontak {
    background: #222;
    color: white;
}

form {
    background: white;
    color: black;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}

input[type="submit"] {
    background: #00eaff;
    border: none;
    cursor: pointer;
}

input[type="submit"]:hover {
    background: #0099cc;
}

/* TEXT */
.highlight {
    color: #00eaff;
    font-weight: bold;
}

/* ANIMASI */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#profil">Profil</a>
    <a href="#kontak">Kontak</a>
</div>

<!-- HOME -->
<div id="home" class="header">
    <img src="https://i.imgur.com/oO0Q2gU.jpeg">
    <h1>Dwi Ahmad Firdaus</h1>
    <p><span class="highlight">Mahasiswa Informatika</span></p>
    <p>Selamat datang di website profil saya</p>
</div>

<!-- PROFIL -->
<div id="profil" class="section">
    <h2>Profil Saya</h2>

    <div class="container">
        <div class="card">
            <h3>Tentang Saya</h3>
            <p>Saya mahasiswa informatika yang sedang belajar web development.</p>
        </div>

        <div class="card">
            <h3>Hobi</h3>
            <ul>
                <li>Mancing</li>
                <li>Main Game</li>
                <li>Jalan-Jalan</li>
            </ul>
        </div>

        <div class="card">
            <h3>Skill</h3>
            <ul>
                <li>HTML</li>
                <li>Desain</li>
                <li>Editing</li>
            </ul>
        </div>
    </div>
</div>

<!-- KONTAK -->
<div id="kontak" class="section">
    <h2>Kontak Saya</h2>

    <form>
        <input type="text" placeholder="Nama">
        <input type="email" placeholder="Email">
        <textarea placeholder="Pesan"></textarea>
        <input type="submit" value="Kirim">
    </form>
</div>

</body>
</html>
